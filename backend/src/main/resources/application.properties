spring.application.name=backend
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/db_bookstore?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${JWT_SECRET_BASE64:c3VwZXItc2VjcmV0LWtleS1mb3Itand0LXNpZ25pbmctMzItYnl0ZXM=}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
